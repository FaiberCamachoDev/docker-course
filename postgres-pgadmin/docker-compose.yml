services:
  db:
    container_name: postgres_database
    image: postgres:15.1
    volumes:
      # - postgres-db:/var/lib/postgresql # ejemplo 1 named volume lo guarda docker en sus archivos
      - ./postgres:/var/lib/postgresql/data #bind volume, le indico donde se guarda 
    environment:
      - POSTGRES_PASSWORD=123456


  pgAdmin:
    container_name: pgadmin
    image: dpage/pgadmin4:6.17
    ports:
      - "8080:80"
    volumes:
      - ./pgadmin:/var/lib/pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=superman@google.com 
      - PGADMIN_DEFAULT_PASSWORD=123456
    depends_on:
      - db
